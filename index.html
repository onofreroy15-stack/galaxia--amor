<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Galaxia 3D | Estrella Brillante y Amor en Órbita</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', 'Quicksand', sans-serif;
            touch-action: none;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            z-index: 100;
            background: rgba(5, 5, 20, 0.7);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            border: 1px solid rgba(255, 180, 220, 0.6);
            box-shadow: 0 0 25px rgba(255, 80, 140, 0.3);
            pointer-events: auto;
            font-weight: 500;
        }
        button, .file-label {
            background: rgba(255, 220, 240, 0.2);
            border: none;
            color: #ffeef4;
            font-size: 0.9rem;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.25s ease;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            touch-action: manipulation;
        }
        button:active, .file-label:active {
            transform: scale(0.96);
        }
        button:hover, .file-label:hover {
            background: rgba(255, 120, 170, 0.8);
            transform: scale(1.03);
            box-shadow: 0 0 15px #ff80b0;
        }
        .file-label input {
            display: none;
        }
        .title {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 100;
            font-size: 1.5rem;
            font-weight: 700;
            text-shadow: 0 0 20px #ff44aa, 0 0 35px #ff66cc;
            background: linear-gradient(135deg, #ffe6f0, #ffb3d9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            pointer-events: none;
            font-family: 'Dancing Script', cursive;
        }
        .info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            z-index: 100;
            color: #ffd9e6;
            pointer-events: none;
            font-family: monospace;
        }
        @media (max-width: 700px) {
            .controls { gap: 8px; padding: 8px 16px; bottom: 12px; }
            button, .file-label { padding: 5px 12px; font-size: 0.7rem; }
            .title { font-size: 1.2rem; top: 12px; }
            .info { font-size: 0.6rem; bottom: 12px; right: 12px; }
        }
        @media (max-width: 480px) {
            button, .file-label { padding: 4px 10px; font-size: 0.65rem; }
            .title { font-size: 1rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="title">
        ✨🌌 GALAXIA para ti ROCII 🌌✨
    </div>
    <div class="controls">
        <label class="file-label">
            📸 SUBIR FOTO (aparecerá flotando)
            <input type="file" id="photoUpload" accept="image/jpeg, image/png, image/jpg">
        </label>
        <button id="addStarBtn">✨ AÑADIR ESTRELLA DE AMOR</button>
        <button id="resetViewBtn">⟳ REINICIAR CÁMARA</button>
    </div>
    <div class="info">
        🖱️ Arrastra 360° | 🔍 Zoom (pellizco o scroll)
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ---------- LISTA DE FRASES ROMÁNTICAS (con las palabras de Rocio, cocodrilita, etc.) ----------
        const romanticPhrases = [
            "❤️ Love", "💖 Teamo", "✨ amor de mi vida", "🌹 AMOR", "💕 MI VIDA",
            "💗 Te-amo", "💞 Love & Love", "💓 Rocio", "🐊 cocodrilita",
            "👑 mi niña", "💖 mi princesa", "💗 mi corazon", "🌙 mi vida", "💘 pasión eterna",
            "✨ eres mi galaxy", "💫 TE AMO infinito", "🌸 mi cielo", "🌌 universo tuyo", "estrella mía"
        ];
        
        // ---------- CONFIGURACIÓN INICIAL ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020210);
        scene.fog = new THREE.FogExp2(0x020210, 0.0005);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 3000);
        camera.position.set(8, 5, 18);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // ---------- CONTROLES ORBIT (optimizados para táctil) ----------
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 0.8;
        controls.panSpeed = 0.6;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.touchRotate = true;
        controls.touchZoom = true;
        controls.target.set(0, 0, 0);
        
        // ---------- ILUMINACIÓN ----------
        const ambientLight = new THREE.AmbientLight(0x221133);
        scene.add(ambientLight);
        const centerLight = new THREE.PointLight(0xffaa66, 1.0, 35);
        centerLight.position.set(0, 0, 0);
        scene.add(centerLight);
        const fillLight = new THREE.DirectionalLight(0xffccdd, 0.6);
        fillLight.position.set(2, 3, 4);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x44aaff, 0.4);
        backLight.position.set(-2, -1, -3);
        scene.add(backLight);
        
        // ---------- ESTRELLAS CON TAMAÑO VARIABLE Y COLOR CAMBIANTE (SHADER) ----------
        const starCount = 4000;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        const starSizes = new Float32Array(starCount);
        
        for (let i = 0; i < starCount; i++) {
            const radius = 100 + Math.random() * 250;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta) * 0.35;
            starPositions[i*3+2] = radius * Math.cos(phi);
            starSizes[i] = 0.15 + Math.random() * 0.5;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeometry.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
        
        const vertexShader = `
            attribute float size;
            varying float vSeed;
            void main() {
                vSeed = position.x + position.y + position.z;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * ( 300.0 / - mvPosition.z ) * 1.2;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        const fragmentShader = `
            uniform float uTime;
            varying float vSeed;
            void main() {
                float hue = fract( uTime * 0.15 + vSeed * 0.03 );
                vec3 color = 0.5 + 0.5 * cos( 6.28318 * (hue + vec3(0.0, 0.33, 0.67)) );
                gl_FragColor = vec4( color, 0.85 );
            }
        `;
        const starUniforms = { uTime: { value: 0 } };
        const starMaterial = new THREE.ShaderMaterial({
            uniforms: starUniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const starField = new THREE.Points(starGeometry, starMaterial);
        scene.add(starField);
        
        // Estrellas lejanas fijas
        const bgStarGeo = new THREE.BufferGeometry();
        const bgCount = 3000;
        const bgPositions = [];
        for (let i = 0; i < bgCount; i++) {
            bgPositions.push((Math.random() - 0.5) * 900);
            bgPositions.push((Math.random() - 0.5) * 600);
            bgPositions.push((Math.random() - 0.5) * 500 - 150);
        }
        bgStarGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(bgPositions), 3));
        const bgStarMat = new THREE.PointsMaterial({ color: 0xffccdd, size: 0.12, transparent: true, blending: THREE.AdditiveBlending });
        const bgStars = new THREE.Points(bgStarGeo, bgStarMat);
        scene.add(bgStars);
        
        // Polvo galáctico y anillos
        const dustGeo = new THREE.BufferGeometry();
        const dustCount = 2500;
        const dustPositions = [];
        for (let i = 0; i < dustCount; i++) {
            const r = 3 + Math.random() * 9;
            const angle = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 1.8;
            dustPositions.push(Math.cos(angle) * r, yOff, Math.sin(angle) * r);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPositions), 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xff88aa, size: 0.05, transparent: true, blending: THREE.AdditiveBlending });
        const dustRing = new THREE.Points(dustGeo, dustMat);
        scene.add(dustRing);
        
        const ringGeo = new THREE.TorusGeometry(4.2, 0.07, 64, 400);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xff77aa, emissive: 0x441133 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
        
        const ring2Geo = new THREE.TorusGeometry(6.5, 0.05, 64, 500);
        const ring2Mat = new THREE.MeshStandardMaterial({ color: 0xffaacc, emissive: 0x331122 });
        const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
        ring2.rotation.x = Math.PI / 2 + 0.3;
        scene.add(ring2);
        
        // ---------- NUEVO CENTRO: ESTRELLA BRILLANTE (en lugar del corazón grande) ----------
        // Crear una estrella de 8 puntas usando un grupo de geometrías o un mesh con textura.
        // Para simplificar y que sea brillante, usaremos una esfera con material emisivo y un conjunto de conos alrededor.
        const starGroup = new THREE.Group();
        
        // Núcleo brillante (esfera pequeña)
        const coreStar = new THREE.Mesh(
            new THREE.SphereGeometry(0.45, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0xffdd88, emissive: 0xffaa44, emissiveIntensity: 1.2, metalness: 0.8, roughness: 0.2 })
        );
        starGroup.add(coreStar);
        
        // Puntas de la estrella (8 conos alrededor)
        const spikeMaterial = new THREE.MeshStandardMaterial({ color: 0xffcc77, emissive: 0xff8844, emissiveIntensity: 0.8 });
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const cone = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.7, 8), spikeMaterial);
            cone.position.set(Math.cos(angle) * 0.65, Math.sin(angle) * 0.65, 0);
            cone.rotation.z = angle;
            starGroup.add(cone);
        }
        // Puntas en el eje Z también para dar volumen
        const coneZ1 = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.7, 8), spikeMaterial);
        coneZ1.position.set(0, 0, 0.65);
        coneZ1.rotation.x = Math.PI / 2;
        starGroup.add(coneZ1);
        const coneZ2 = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.7, 8), spikeMaterial);
        coneZ2.position.set(0, 0, -0.65);
        coneZ2.rotation.x = -Math.PI / 2;
        starGroup.add(coneZ2);
        
        scene.add(starGroup);
        
        // Añadir un resplandor exterior (una esfera más grande semitransparente)
        const glowGeometry = new THREE.SphereGeometry(0.85, 16, 16);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0xffaa66,
            transparent: true,
            opacity: 0.25,
            blending: THREE.AdditiveBlending
        });
        const outerGlow = new THREE.Mesh(glowGeometry, glowMaterial);
        starGroup.add(outerGlow);
        
        // Luz pulsante central (ya existía centerLight, la ajustamos)
        centerLight.intensity = 1.0;
        centerLight.color.setHex(0xffaa66);
        
        // Pequeñas partículas orbitando alrededor de la estrella central
        const starDustGeo = new THREE.BufferGeometry();
        const dustCountCenter = 400;
        const dustCenterPos = [];
        for (let i = 0; i < dustCountCenter; i++) {
            const rad = 0.9 + Math.random() * 0.6;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            dustCenterPos.push(rad * Math.sin(phi) * Math.cos(theta), rad * Math.sin(phi) * Math.sin(theta), rad * Math.cos(phi));
        }
        starDustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustCenterPos), 3));
        const starDustMat = new THREE.PointsMaterial({ color: 0xffaa88, size: 0.03, blending: THREE.AdditiveBlending });
        const starDustPoints = new THREE.Points(starDustGeo, starDustMat);
        starGroup.add(starDustPoints);
        
        // ---------- ELEMENTOS FLOTANTES: FRASES + IMÁGENES ----------
        const floatingItems = [];
        
        function createLabel(text, bgColor = 'linear-gradient(135deg, rgba(80, 50, 100, 0.8), rgba(180, 70, 120, 0.8))') {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = 'white';
            div.style.fontFamily = "'Dancing Script', 'Poppins', cursive";
            div.style.fontSize = '1.2rem';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '0 0 12px #ff66aa';
            div.style.background = bgColor;
            div.style.padding = '8px 18px';
            div.style.borderRadius = '60px';
            div.style.border = '1px solid rgba(255,200,220,0.8)';
            div.style.backdropFilter = 'blur(8px)';
            div.style.boxShadow = '0 0 20px rgba(255,80,120,0.6)';
            div.style.whiteSpace = 'nowrap';
            div.style.letterSpacing = '1px';
            return new CSS2DObject(div);
        }
        
        function createImageLabel(imgUrl, altText = "✨ Mi amor ✨") {
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.flexDirection = 'column';
            div.style.alignItems = 'center';
            div.style.background = 'rgba(0,0,0,0.5)';
            div.style.backdropFilter = 'blur(12px)';
            div.style.borderRadius = '20px';
            div.style.padding = '8px';
            div.style.border = '2px solid #ff99cc';
            div.style.boxShadow = '0 0 25px #ff66aa';
            const img = document.createElement('img');
            img.src = imgUrl;
            img.style.width = '90px';
            img.style.height = '90px';
            img.style.objectFit = 'cover';
            img.style.borderRadius = '16px';
            img.style.border = '2px solid #ffc0e0';
            const caption = document.createElement('span');
            caption.textContent = altText;
            caption.style.color = '#fff0f5';
            caption.style.fontSize = '0.8rem';
            caption.style.fontFamily = "'Poppins', cursive";
            caption.style.marginTop = '5px';
            caption.style.textShadow = '0 0 5px #ff3388';
            div.appendChild(img);
            div.appendChild(caption);
            return new CSS2DObject(div);
        }
        
        const phrasesList = [...romanticPhrases];
        const specialWords = ["💖 Rocio 💖", "🐊 cocodrilita", "👑 mi princesa", "💓 mi corazon", "🌙 mi vida", "💕 mi niña"];
        phrasesList.push(...specialWords);
        
        for (let i = 0; i < phrasesList.length; i++) {
            const label = createLabel(phrasesList[i], `linear-gradient(135deg, rgba(${120 + i * 30 % 100}, 50, 100, 0.85), rgba(200, 60, 120, 0.85))`);
            const radius = 3.8 + Math.random() * 5.2;
            const speed = (0.002 + Math.random() * 0.007) * (Math.random() > 0.6 ? 1 : -1);
            const angleY = Math.random() * Math.PI * 2;
            const yOffset = (Math.random() - 0.5) * 2.5;
            const speedY = 0.001 + Math.random() * 0.003;
            scene.add(label);
            floatingItems.push({
                obj: label, radius, speed, angle: angleY, yOffset, speedY, yAngle: Math.random() * Math.PI * 2, isImage: false
            });
        }
        
        // Subida de fotos
        const photoInput = document.getElementById('photoUpload');
        photoInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const imgUrl = e.target.result;
                const imgLabel = createImageLabel(imgUrl, "💖 Mi amor 💖");
                const radius = 4.5 + Math.random() * 6;
                const speed = (0.0015 + Math.random() * 0.008) * (Math.random() > 0.5 ? 1 : -1);
                const angleY = Math.random() * Math.PI * 2;
                const yOffset = (Math.random() - 0.5) * 2.2;
                const speedY = 0.0008 + Math.random() * 0.004;
                scene.add(imgLabel);
                floatingItems.push({
                    obj: imgLabel, radius, speed, angle: angleY, yOffset, speedY, yAngle: Math.random() * Math.PI * 2, isImage: true
                });
            };
            reader.readAsDataURL(file);
        });
        
        // Añadir estrella de amor (nueva frase)
        document.getElementById('addStarBtn').addEventListener('click', () => {
            const newPhrase = romanticPhrases[Math.floor(Math.random() * romanticPhrases.length)] + " ✨";
            const label = createLabel(newPhrase, `linear-gradient(135deg, rgba(200, 80, 140, 0.85), rgba(255, 100, 160, 0.85))`);
            const radius = 3.5 + Math.random() * 7;
            const speed = (0.001 + Math.random() * 0.01) * (Math.random() > 0.5 ? 1 : -1);
            const angleY = Math.random() * Math.PI * 2;
            const yOffset = (Math.random() - 0.5) * 2.8;
            const speedY = 0.0005 + Math.random() * 0.005;
            scene.add(label);
            floatingItems.push({
                obj: label, radius, speed, angle: angleY, yOffset, speedY, yAngle: Math.random() * Math.PI * 2, isImage: false
            });
        });
        
        document.getElementById('resetViewBtn').addEventListener('click', () => {
            camera.position.set(8, 5, 18);
            controls.target.set(0, 0, 0);
            controls.update();
        });
        
        // Partículas de polvo brillante alrededor del centro (adicionales)
        const glowCount = 800;
        const glowPositions = [];
        for (let i = 0; i < glowCount; i++) {
            const rad = 1.2 + Math.random() * 3.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            glowPositions.push(rad * Math.sin(phi) * Math.cos(theta), rad * Math.sin(phi) * Math.sin(theta), rad * Math.cos(phi));
        }
        const glowGeo = new THREE.BufferGeometry();
        glowGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(glowPositions), 3));
        const glowMat = new THREE.PointsMaterial({ color: 0xffaa77, size: 0.06, blending: THREE.AdditiveBlending });
        const glowDust = new THREE.Points(glowGeo, glowMat);
        scene.add(glowDust);
        
        // Partículas mágicas extra
        const magicCount = 1500;
        const magicPositions = [];
        for (let i = 0; i < magicCount; i++) {
            const r = 2 + Math.random() * 8;
            const ang = Math.random() * Math.PI * 2;
            const yLev = (Math.random() - 0.5) * 3;
            magicPositions.push(Math.cos(ang) * r, yLev, Math.sin(ang) * r);
        }
        const magicGeo = new THREE.BufferGeometry();
        magicGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(magicPositions), 3));
        const magicMat = new THREE.PointsMaterial({ color: 0xffaacc, size: 0.05, transparent: true, blending: THREE.AdditiveBlending });
        const magicPoints = new THREE.Points(magicGeo, magicMat);
        scene.add(magicPoints);
        
        // ---------- ANIMACIÓN ----------
        let timeAcc = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            timeAcc += 0.016;
            
            // Actualizar shader de estrellas
            starUniforms.uTime.value = timeAcc;
            
            // Hacer pulsar la estrella central y su resplandor
            const scalePulse = 1 + Math.sin(timeAcc * 6) * 0.05;
            starGroup.scale.set(scalePulse, scalePulse, scalePulse);
            // Intensidad de la luz central
            centerLight.intensity = 0.9 + Math.sin(timeAcc * 5) * 0.3;
            // Rotación suave de la estrella
            starGroup.rotation.z = Math.sin(timeAcc * 0.8) * 0.2;
            starGroup.rotation.x = Math.sin(timeAcc * 0.5) * 0.1;
            
            // Mover elementos flotantes
            floatingItems.forEach(item => {
                item.angle += item.speed;
                if (item.angle > Math.PI * 2) item.angle -= Math.PI * 2;
                item.yAngle += item.speedY;
                const yPos = item.yOffset + Math.sin(item.yAngle) * 0.8;
                const xPos = Math.cos(item.angle) * item.radius;
                const zPos = Math.sin(item.angle) * item.radius;
                item.obj.position.set(xPos, yPos, zPos);
            });
            
            // Rotaciones decorativas
            ring.rotation.z += 0.003;
            ring2.rotation.x += 0.002;
            ring2.rotation.z -= 0.001;
            dustRing.rotation.y += 0.005;
            bgStars.rotation.y -= 0.0002;
            glowDust.rotation.y += 0.01;
            magicPoints.rotation.y += 0.003;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
        console.log("✨ Galaxia actualizada: centro con estrella brillante (en lugar de corazón grande) | Perfecto para móvil y PC");
    </script>
</body>
</html>
